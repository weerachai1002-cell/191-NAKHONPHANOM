<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>เช็คชื่อเวรสื่อสาร 191 นครพนม</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Sarabun', -apple-system, sans-serif; background:#f3f4f6; margin:0; padding:0; }
  .container { max-width:480px; margin:0 auto; padding:20px 16px 60px; }
  h1 { font-size:20px; color:#7a1128; text-align:center; margin:16px 0 4px; }
  .sub { text-align:center; color:#6b7280; font-size:13px; margin-bottom:20px; }
  .step { background:#fff; border-radius:12px; padding:16px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .step-title { font-size:14px; font-weight:700; color:#7a1128; margin-bottom:10px; }
  .station-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .station-btn { padding:12px 8px; border:1px solid #d1d5db; border-radius:8px; background:#fff; font-size:13.5px; cursor:pointer; text-align:center; }
  .station-btn.selected { background:#7a1128; color:#fff; border-color:#7a1128; }
  #officerSection { display:none; }
  .officer-row { display:flex; align-items:center; justify-content:space-between; padding:12px; border:1px solid #e5e7eb; border-radius:8px; margin-bottom:8px; }
  .officer-row.on-duty { background:#dcfce7; border-color:#16a34a; }
  .officer-name { font-size:14px; }
  .officer-phone { font-size:12px; color:#9ca3af; }
  .duty-btn { background:#7a1128; color:#fff; border:none; border-radius:20px; padding:8px 16px; font-size:13px; cursor:pointer; white-space:nowrap; }
  .duty-btn.active { background:#16a34a; }
  .delete-officer-btn { background:#fee2e2; color:#b91c1c; border:1px solid #fecaca; border-radius:50%; width:28px; height:28px; font-size:13px; cursor:pointer; flex-shrink:0; }
  .delete-officer-btn:hover { background:#fecaca; }
  .add-row { display:flex; gap:8px; margin-top:12px; }
  input[type=text] { flex:1; padding:10px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; font-family:inherit; }
  .add-btn { background:#374151; color:#fff; border:none; border-radius:8px; padding:10px 14px; font-size:13px; cursor:pointer; }
  #statusMsg { text-align:center; font-size:13px; margin-top:12px; min-height:18px; }
  .empty-msg { font-size:13px; color:#9ca3af; text-align:center; padding:8px; }
</style>
</head>
<body>
<div class="container">
  <h1>📻 เช็คชื่อเวรสื่อสาร</h1>
  <p class="sub">ศูนย์รับแจ้งเหตุฉุกเฉิน 191 ตำรวจภูธรจังหวัดนครพนม</p>

  <div class="step">
    <div class="step-title">1. เลือก สภ. ของคุณ</div>
    <div class="station-grid" id="stationGrid"></div>
  </div>

  <div class="step" id="officerSection">
    <div class="step-title">2. แตะชื่อของคุณ เพื่อติ๊กว่าเข้าเวรวันนี้</div>
    <div id="officerList"></div>

    <div class="add-row">
      <input type="text" id="newOfficerName" placeholder="ถ้าไม่มีชื่อคุณ พิมพ์ชื่อ-ยศที่นี่">
      <button class="add-btn" id="addOfficerBtn">เพิ่ม</button>
    </div>
    <input type="text" id="newOfficerPhone" placeholder="เบอร์โทร (ถ้าเพิ่มชื่อใหม่)" style="width:100%; margin-top:8px;">

    <div id="statusMsg"></div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbws-jcNX1Jj4r58AbEKpy6MaKvBp5bzMDdPwNsDjXTeeM4N9fzBcPltAey1bCgsyaYK/exec';

const STATIONS = [
  'สภ.เมืองนครพนม','สภ.บ้านแพง','สภ.ปลาปาก','สภ.ท่าอุเทน','สภ.ธาตุพนม',
  'สภ.นาแก','สภ.เรณูนคร','สภ.กุตาไก้','สภ.นาโดน','สภ.นาทม',
  'สภ.นาหว้า','สภ.บ้านกลาง','สภ.พระซอง','สภ.โพนสวรรค์','สภ.วังยาง',
  'สภ.ศรีสงคราม','สภ.หลักศิลา','สภ.หนองฮี','สภ.หนองบ่อ'
];

let selectedStation = null;
let allDutyData = {};

// สร้างปุ่มเลือก สภ.
const stationGrid = document.getElementById('stationGrid');
STATIONS.forEach(station => {
  const btn = document.createElement('div');
  btn.className = 'station-btn';
  btn.textContent = station.replace('สภ.', '');
  btn.addEventListener('click', () => selectStation(station, btn));
  stationGrid.appendChild(btn);
});

function selectStation(station, btnEl) {
  selectedStation = station;
  document.querySelectorAll('.station-btn').forEach(b => b.classList.remove('selected'));
  btnEl.classList.add('selected');
  document.getElementById('officerSection').style.display = 'block';
  renderOfficers();
  document.getElementById('officerSection').scrollIntoView({ behavior: 'smooth' });
}

async function loadAllDutyData() {
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=listDutyOfficers');
    const data = await res.json();
    if (data.status === 'ok' && data.officers) {
      allDutyData = data.officers;
    }
  } catch (e) { /* ใช้ค่าว่างไปก่อนถ้าดึงไม่ได้ */ }
}

let tappedThisSession = {}; // { stationName: officerIndex } — สถานะสีเขียวเฉพาะที่กดในรอบนี้เท่านั้น ไม่ใช้ค่า onDuty เดิมจากฐานข้อมูลมาโชว์เขียวตั้งแต่แรก

function renderOfficers() {
  const listBox = document.getElementById('officerList');
  const officers = allDutyData[selectedStation] || [];
  listBox.innerHTML = '';

  if (officers.length === 0) {
    listBox.innerHTML = '<div class="empty-msg">ยังไม่มีรายชื่อสำหรับ ' + selectedStation + ' — พิมพ์ชื่อเพิ่มด้านล่างได้เลย</div>';
    return;
  }

  const tappedIdx = tappedThisSession[selectedStation];

  officers.forEach((officer, idx) => {
    const isTapped = (tappedIdx === idx);
    const row = document.createElement('div');
    row.className = 'officer-row' + (isTapped ? ' on-duty' : '');
    row.innerHTML = `
      <div>
        <div class="officer-name">${officer.name || '(ไม่มีชื่อ)'}</div>
        <div class="officer-phone">${officer.phone || ''}</div>
      </div>
      <div style="display:flex; align-items:center; gap:6px;">
        <button class="duty-btn ${isTapped ? 'active' : ''}">${isTapped ? '✓ เวรสื่อสารวันนี้' : 'ฉันเข้าเวร'}</button>
        <button class="delete-officer-btn" title="ลบรายชื่อนี้">✕</button>
      </div>
    `;
    row.querySelector('.duty-btn').addEventListener('click', () => markOnDuty(idx));
    row.querySelector('.delete-officer-btn').addEventListener('click', () => deleteOfficer(idx));
    listBox.appendChild(row);
  });
}

async function deleteOfficer(idx) {
  const officers = allDutyData[selectedStation] || [];
  const officer = officers[idx];
  if (!officer) return;
  if (!confirm(`ลบรายชื่อ "${officer.name}" ออกจากรายชื่อเวรสื่อสารของ ${selectedStation} ใช่หรือไม่?`)) return;

  officers.splice(idx, 1);
  allDutyData[selectedStation] = officers;

  // ถ้าลบคนที่กำลังโชว์เขียวอยู่ในรอบนี้ ให้ล้างสถานะที่จำไว้ด้วย
  if (tappedThisSession[selectedStation] === idx) {
    delete tappedThisSession[selectedStation];
  } else if (tappedThisSession[selectedStation] > idx) {
    tappedThisSession[selectedStation] -= 1; // เลื่อน index ตามลำดับที่เปลี่ยนไปหลังลบ
  }

  renderOfficers();
  await saveToServer();
  flashStatus(`✓ ลบรายชื่อ "${officer.name}" แล้ว`);
}

async function markOnDuty(idx) {
  const officers = allDutyData[selectedStation] || [];
  officers.forEach(o => o.onDuty = false);
  officers[idx].onDuty = true;
  allDutyData[selectedStation] = officers;
  tappedThisSession[selectedStation] = idx; // จำไว้แค่รอบนี้ ให้ขึ้นเขียวทันทีที่กด
  renderOfficers();
  await saveToServer();
  await markStationConfirmed(selectedStation);
  flashStatus(`✓ บันทึกแล้ว: ${officers[idx].name} เข้าเวรวันนี้`);
}

document.getElementById('addOfficerBtn').addEventListener('click', async () => {
  if (!selectedStation) return;
  const nameInput = document.getElementById('newOfficerName');
  const phoneInput = document.getElementById('newOfficerPhone');
  const name = nameInput.value.trim();
  const phone = phoneInput.value.trim();
  if (!name) {
    flashStatus('กรุณาพิมพ์ชื่อก่อนกด "เพิ่ม"');
    return;
  }
  const officers = allDutyData[selectedStation] || [];
  officers.forEach(o => o.onDuty = false); // เพิ่มชื่อใหม่ = ตั้งเป็นเวรวันนี้ทันที
  officers.push({ name, phone, onDuty: true });
  allDutyData[selectedStation] = officers;
  tappedThisSession[selectedStation] = officers.length - 1; // ชื่อที่เพิ่งเพิ่ม = แถวสุดท้าย
  nameInput.value = '';
  phoneInput.value = '';
  renderOfficers();
  await saveToServer();
  await markStationConfirmed(selectedStation);
  flashStatus(`✓ เพิ่มชื่อและบันทึกเวรวันนี้แล้ว: ${name}`);
});

async function saveToServer() {
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'action=saveDutyOfficers&data=' + encodeURIComponent(JSON.stringify(allDutyData))
    });
  } catch (e) {
    flashStatus('⚠ บันทึกไม่สำเร็จ ตรวจสอบอินเทอร์เน็ตแล้วลองอีกครั้ง');
  }
}

// ทำเครื่องหมายว่า สภ.นี้ยืนยันเวรวันนี้แล้ว — ใช้ระบบเดียวกับหน้ารับแจ้งเหตุหลัก (ทำให้ชิพ สภ. ขึ้นสีเขียว)
// เก็บแยกจากรายชื่อเจ้าหน้าที่ เพื่อให้ฝั่งเว็บหลักกดปุ่ม "รีเซ็ต" ล้างสีเขียวได้ โดยไม่ลบรายชื่อ/เบอร์ที่ตั้งไว้
async function markStationConfirmed(stationName) {
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=listDutyConfirmed');
    const data = await res.json();
    const confirmed = (data.status === 'ok' && data.confirmed) ? data.confirmed : {};
    confirmed[stationName] = true;
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'action=saveDutyConfirmed&data=' + encodeURIComponent(JSON.stringify(confirmed))
    });
  } catch (e) { /* ถ้าซิงก์สถานะเขียวไม่สำเร็จ อย่างน้อยรายชื่อเวรก็บันทึกแล้ว */ }
}

// ข้อความ "บันทึกแล้ว" จะค้างอยู่ ไม่หายไปเอง — จะหายก็ต่อเมื่อมีข้อความใหม่มาแทนที่เท่านั้น
function flashStatus(msg) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
}

loadAllDutyData();
</script>
</body>
</html>
